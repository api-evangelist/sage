naftiko: 1.0.0-alpha2
info:
  label: Sage Accounting API — Ledger Accounts
  description: 'Sage Accounting API — Ledger Accounts. 1 operations. Lead operation: List Ledger Accounts. Self-contained
    Naftiko capability covering one Sage business surface.'
  tags:
  - Sage
  - Ledger Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SAGE_API_KEY: SAGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounting-ledger-accounts
    baseUri: https://api.accounting.sage.com/v3.1
    description: Sage Accounting API — Ledger Accounts business capability. Self-contained, no shared references.
    resources:
    - name: ledger_accounts
      path: /ledger_accounts
      operations:
      - name: listledgeraccounts
        method: GET
        description: List Ledger Accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: visible_in
          in: query
          type: string
        - name: page
          in: query
          type: integer
    authentication:
      type: bearer
      token: '{{env.SAGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: accounting-ledger-accounts-rest
    port: 8080
    description: REST adapter for Sage Accounting API — Ledger Accounts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/ledger-accounts
      name: ledger-accounts
      description: REST surface for ledger_accounts.
      operations:
      - method: GET
        name: listledgeraccounts
        description: List Ledger Accounts
        call: accounting-ledger-accounts.listledgeraccounts
        with:
          visible_in: rest.visible_in
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounting-ledger-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sage Accounting API — Ledger Accounts. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-ledger-accounts
      description: List Ledger Accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-ledger-accounts.listledgeraccounts
      with:
        visible_in: tools.visible_in
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
