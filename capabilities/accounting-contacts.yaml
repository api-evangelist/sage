naftiko: 1.0.0-alpha2
info:
  label: Sage Accounting API — Contacts
  description: 'Sage Accounting API — Contacts. 5 operations. Lead operation: List Contacts. Self-contained Naftiko capability
    covering one Sage business surface.'
  tags:
  - Sage
  - Contacts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SAGE_API_KEY: SAGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounting-contacts
    baseUri: https://api.accounting.sage.com/v3.1
    description: Sage Accounting API — Contacts business capability. Self-contained, no shared references.
    resources:
    - name: contacts
      path: /contacts
      operations:
      - name: listcontacts
        method: GET
        description: List Contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contact_type_ids
          in: query
          type: string
          description: Filter by contact type IDs (CUSTOMER, SUPPLIER)
        - name: search
          in: query
          type: string
          description: Search contacts by name or reference
        - name: page
          in: query
          type: integer
        - name: items_per_page
          in: query
          type: integer
      - name: createcontact
        method: POST
        description: Create Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: contacts-key
      path: /contacts/{key}
      operations:
      - name: getcontact
        method: GET
        description: Get Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key
          in: path
          type: string
          description: Contact unique identifier
          required: true
      - name: updatecontact
        method: PUT
        description: Update Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletecontact
        method: DELETE
        description: Delete Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.SAGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: accounting-contacts-rest
    port: 8080
    description: REST adapter for Sage Accounting API — Contacts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/contacts
      name: contacts
      description: REST surface for contacts.
      operations:
      - method: GET
        name: listcontacts
        description: List Contacts
        call: accounting-contacts.listcontacts
        with:
          contact_type_ids: rest.contact_type_ids
          search: rest.search
          page: rest.page
          items_per_page: rest.items_per_page
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcontact
        description: Create Contact
        call: accounting-contacts.createcontact
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/contacts/{key}
      name: contacts-key
      description: REST surface for contacts-key.
      operations:
      - method: GET
        name: getcontact
        description: Get Contact
        call: accounting-contacts.getcontact
        with:
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatecontact
        description: Update Contact
        call: accounting-contacts.updatecontact
        with:
          key: rest.key
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecontact
        description: Delete Contact
        call: accounting-contacts.deletecontact
        with:
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounting-contacts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sage Accounting API — Contacts. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-contacts
      description: List Contacts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-contacts.listcontacts
      with:
        contact_type_ids: tools.contact_type_ids
        search: tools.search
        page: tools.page
        items_per_page: tools.items_per_page
      outputParameters:
      - type: object
        mapping: $.
    - name: create-contact
      description: Create Contact
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: accounting-contacts.createcontact
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-contact
      description: Get Contact
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-contacts.getcontact
      with:
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
    - name: update-contact
      description: Update Contact
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: accounting-contacts.updatecontact
      with:
        key: tools.key
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-contact
      description: Delete Contact
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: accounting-contacts.deletecontact
      with:
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
