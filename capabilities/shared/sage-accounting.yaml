naftiko: "1.0.0-alpha1"

info:
  label: "Sage Accounting API"
  description: "Sage Accounting API v3.1 providing RESTful access to contacts, invoices, payments, bank accounts, ledger accounts, products, and financial reporting for Sage Business Cloud Accounting."
  tags:
    - Accounting
    - ERP
    - Finance
    - Cloud Software
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SAGE_ACCESS_TOKEN: SAGE_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: sage-accounting
      baseUri: https://api.accounting.sage.com/v3.1
      description: "Sage Accounting API v3.1"
      authentication:
        type: bearer
        token: "{{SAGE_ACCESS_TOKEN}}"
      resources:
        - name: contacts
          path: /contacts
          description: "Customer and supplier contact management"
          operations:
            - name: list-contacts
              method: GET
              description: "List customer and supplier contacts"
              inputParameters:
                - name: contact_type_ids
                  in: query
                  type: string
                  required: false
                  description: "Filter by contact type: CUSTOMER or SUPPLIER"
                - name: search
                  in: query
                  type: string
                  required: false
                  description: "Search by name or reference"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-contact
              method: POST
              description: "Create a new customer or supplier contact"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  contact:
                    name: "{{tools.name}}"
                    contact_type_ids: "{{tools.contact_type_ids}}"
                    email: "{{tools.email}}"

        - name: contact-detail
          path: /contacts/{key}
          description: "Individual contact operations"
          operations:
            - name: get-contact
              method: GET
              description: "Get contact details by ID"
              inputParameters:
                - name: key
                  in: path
                  type: string
                  required: true
                  description: "Contact unique identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-contact
              method: PUT
              description: "Update a contact's details"
              inputParameters:
                - name: key
                  in: path
                  type: string
                  required: true
                  description: "Contact unique identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  contact:
                    name: "{{tools.name}}"
                    email: "{{tools.email}}"

        - name: sales-invoices
          path: /sales_invoices
          description: "Sales invoice management"
          operations:
            - name: list-sales-invoices
              method: GET
              description: "List sales invoices with optional filtering"
              inputParameters:
                - name: contact_id
                  in: query
                  type: string
                  required: false
                  description: "Filter by customer contact ID"
                - name: status_id
                  in: query
                  type: string
                  required: false
                  description: "Filter by status: DRAFT, SENT, PAID, VOID"
                - name: from_date
                  in: query
                  type: string
                  required: false
                  description: "Filter from date (YYYY-MM-DD)"
                - name: to_date
                  in: query
                  type: string
                  required: false
                  description: "Filter to date (YYYY-MM-DD)"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-sales-invoice
              method: POST
              description: "Create a new sales invoice"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  sales_invoice:
                    contact_id: "{{tools.contact_id}}"
                    date: "{{tools.date}}"
                    due_date: "{{tools.due_date}}"
                    reference: "{{tools.reference}}"
                    line_items: "{{tools.line_items}}"

        - name: sales-invoice-detail
          path: /sales_invoices/{key}
          description: "Individual sales invoice operations"
          operations:
            - name: get-sales-invoice
              method: GET
              description: "Get sales invoice details"
              inputParameters:
                - name: key
                  in: path
                  type: string
                  required: true
                  description: "Invoice unique identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: sales-invoice-payments
          path: /sales_invoices/{key}/payments
          description: "Sales invoice payment recording"
          operations:
            - name: record-sales-payment
              method: POST
              description: "Record a payment received for a sales invoice"
              inputParameters:
                - name: key
                  in: path
                  type: string
                  required: true
                  description: "Invoice ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  payment:
                    payment_type_id: "{{tools.payment_type_id}}"
                    bank_account_id: "{{tools.bank_account_id}}"
                    date: "{{tools.date}}"
                    amount: "{{tools.amount}}"

        - name: purchase-invoices
          path: /purchase_invoices
          description: "Purchase invoice management"
          operations:
            - name: list-purchase-invoices
              method: GET
              description: "List purchase invoices (supplier bills)"
              inputParameters:
                - name: contact_id
                  in: query
                  type: string
                  required: false
                  description: "Filter by supplier contact ID"
                - name: status_id
                  in: query
                  type: string
                  required: false
                  description: "Filter by status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-purchase-invoice
              method: POST
              description: "Create a new purchase invoice (supplier bill)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  purchase_invoice:
                    contact_id: "{{tools.contact_id}}"
                    date: "{{tools.date}}"
                    due_date: "{{tools.due_date}}"
                    line_items: "{{tools.line_items}}"

        - name: bank-accounts
          path: /bank_accounts
          description: "Bank account management"
          operations:
            - name: list-bank-accounts
              method: GET
              description: "List bank accounts connected to the business"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: products
          path: /products
          description: "Product and service catalog"
          operations:
            - name: list-products
              method: GET
              description: "List products and services"
              inputParameters:
                - name: search
                  in: query
                  type: string
                  required: false
                  description: "Search by product name"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-product
              method: POST
              description: "Create a new product or service"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  product:
                    description: "{{tools.description}}"
                    item_code: "{{tools.item_code}}"

        - name: tax-rates
          path: /tax_rates
          description: "Tax rate configuration"
          operations:
            - name: list-tax-rates
              method: GET
              description: "List configured tax rates"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: ledger-accounts
          path: /ledger_accounts
          description: "Chart of accounts"
          operations:
            - name: list-ledger-accounts
              method: GET
              description: "List ledger accounts (chart of accounts)"
              inputParameters:
                - name: visible_in
                  in: query
                  type: string
                  required: false
                  description: "Filter by visibility context"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: sage-accounting-rest
      resources:
        - path: /v1/contacts
          name: contacts
          operations:
            - method: GET
              name: list-contacts
              description: "List contacts"
              call: "sage-accounting.list-contacts"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/invoices
          name: sales-invoices
          operations:
            - method: GET
              name: list-sales-invoices
              description: "List sales invoices"
              call: "sage-accounting.list-sales-invoices"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: sage-accounting-mcp
      transport: http
      tools:
        - name: list-contacts
          description: "List Sage Accounting contacts"
          hints:
            readOnly: true
            openWorld: false
          call: "sage-accounting.list-contacts"
          outputParameters:
            - type: object
              mapping: "$."
