description: 'FOCUS-aligned FinOps placeholder for Sage: API access is bundled with paid Sage product
  subscriptions whose pricing varies by product, region, and seat. With public pages bot-gated, this artifact
  reflects a contracted-spend posture rather than usage-based billing.'
sources:
  - https://developer.sage.com/
  - https://www.sage.com/
notes: Sage marketing and developer pages returned 403; per-product invoice line items, per-call prices,
  and FOCUS-friendly meter mappings could not be verified. This file is a Contact-Sales placeholder.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: The Sage Group plc
serviceCategory: Business Software / ERP / Accounting
billingModel:
  pricingCategory: Subscription / Contact Sales
  billingFrequency: Monthly or Annual
  billingCurrency: USD/GBP/EUR
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Sage
  ServiceCategory: ERP / Accounting Software
  ProviderName: Sage
  PublisherName: The Sage Group plc
  InvoiceIssuerName: Sage Software, Inc. (US) / The Sage Group plc (regional entities)
  BillingCurrency: USD
meters:
  - name: subscription_seats
    unit: seat
    aggregation: max
    dimensions:
      - product
      - region
  - name: product_modules
    unit: varies
    aggregation: sum
    dimensions:
      - product
principles:
  - name: Visibility
    description: Pull seat / module usage from each Sage product portal (Accounting, Intacct, People).
      There is no unified Sage-wide usage API; consolidate at the procurement layer.
  - name: Allocation
    description: Allocate by Sage product, region, and entity since Sage commonly invoices through regional
      entities; tag internal cost centers by Sage tenant.
  - name: Optimization
    description: Right-size seats at renewal, retire unused modules, and consolidate tenants where Sage
      product / region permits.
  - name: Accountability
    description: Finance owns the Sage subscription portfolio; engineering owns API integration health.
      Reconcile invoice line items against tenant seat counts each renewal cycle.
maintainers:
