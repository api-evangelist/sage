specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Sage
providerId: sage
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Accounting
  - Business Management
  - ERP
  - Payroll
  - B2B
description: Sage publishes accounting, ERP, payroll, and HR products (Sage Accounting / Sage 50 / Sage
  Intacct / Sage 200 / Sage People). API access is bundled with a paid Sage subscription and varies by
  product line and region. Sage's public marketing and developer pages are bot-gated, so per-call prices,
  plan inclusions, and quota tiers cannot be confirmed without an active subscription.
sources:
  - https://developer.sage.com/api/accounting/
  - https://www.sage.com/
notes: Sage marketing and developer pages return 403 to scraping; concrete plan prices vary by region
  and product family and could not be verified. API access is sold as part of the Sage product subscription
  rather than as a standalone tier. This artifact is intentionally a single Contact Sales plan rather
  than a fabricated tier.
plans:
  - id: sage-contact-sales
    name: Contact Sales
    type: enterprise
    description: API access bundled with a paid Sage product subscription (Accounting, Intacct, 50, 200,
      People, Payroll). Pricing varies by product, region, seat count, and module mix.
    entries:
      - label: Subscription-Bundled API Access
        name: subscription_bundled_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Sage Accounting API
      - name: Sage Intacct API
      - name: Sage 50 / Sage 200 connectors
      - name: Sage People / HR API
      - name: Sage Payroll API
      - name: Access included with paid Sage subscription per product line
