specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Sage
providerId: sage
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Accounting
  - ERP
  - B2B
  - Rate Limiting
description: Sage's developer documentation pages (developer.sage.com) are bot-gated and could not be
  fetched. Each Sage product (Accounting, Intacct, 50, 200, People, Payroll) maintains its own rate-limiting
  rules in its product-specific developer portal. This artifact is intentionally a Contact Sales placeholder
  until product-specific limits can be confirmed against the entitled developer portal.
sources:
  - https://developer.sage.com/
notes: Public scraping returned 403; numeric throttle values per Sage product family were not retrievable
  in this run.
limits:
  - name: Per-product rate limits
    scope: account
    metric: varies
    limit: see product-specific developer portal
    notes: Sage Accounting, Intacct, and other product lines each define their own rate limits in their
      respective developer portals.
policies:
  - name: Per-product enforcement
    description: Throttles are scoped per Sage product subscription and per tenant; behavior differs between
      Accounting and Intacct in particular.
  - name: Subscription-bundled
    description: Limits ride along with the underlying Sage product subscription rather than being raised
      via a separate API plan.
maintainers:
